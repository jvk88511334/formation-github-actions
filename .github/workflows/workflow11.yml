name: TP011-cache
on: push

jobs:

  Py-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Python environment & cache
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
          python-version: 3.12
      - name: lint verification
        run: |
          pip install ifaddr psutil pylint
          pylint --disable=missing-docstring script/mysystem/mysystem.py

  Py-run:
    runs-on: ubuntu-latest
    needs: Py-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Python environment
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
          python-version: 3.12
      - name: run script
        run: |
          pip install ifaddr psutil 
          python script/mysystem/mysystem.py