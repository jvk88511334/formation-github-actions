name: TP06-jobs-et-dependances
on: push

jobs:

  C-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: sysinfo lint
        run: make lint

  C-compilation:
    runs-on: ubuntu-latest
    needs: C-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: sysinfo compilation
        run: make build

  C-execution:
    runs-on: ubuntu-latest
    needs: C-compilation
    steps:
      - name: execution binaire
        run: ./sysinfo