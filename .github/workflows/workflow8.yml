name: TP-08
on: push

jobs:

  C-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: sysinfo lint
        run: make lint

  C-compilation:
    runs-on: ubuntu-latest
    needs: C-lint
    permissions:
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: sysinfo compilation
        run: make build
      - name: Generate attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'bin/sysinfo'
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: mon-artifact
          path: bin/sysinfo

  C-execution:
    runs-on: ubuntu-latest
    needs: C-compilation
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: mon-artifact
      - name: execution binaire
        run: |
          chmod +x sysinfo
          ./sysinfo