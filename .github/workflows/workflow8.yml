name: TP06-jobs-et-dependances
on: push

jobs:

  C-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: sysinfo lint
        run: make lint

  C-compilation:
    runs-on: ubuntu-latest
    needs: C-lint
    permissions:
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: sysinfo compilation
        run: make build
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: mon-artifact
          path: sysinfo


  C-execution:
    runs-on: ubuntu-latest
    needs: C-compilation
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: mon-artifact
          path: sysinfo
      - name: execution binaire
        run: ./sysinfo